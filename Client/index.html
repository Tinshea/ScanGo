<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- L'icône était référencée via /public/, chemin qui n'existe pas une
         fois le site construit : Vite sert le contenu de public/ à la racine. -->
    <link rel="icon" href="/MangaGoLogo.ico" />

    <meta name="theme-color" content="#050816" />
    <meta name="color-scheme" content="dark" />

    <!-- Titre de repli, avant que React ne prenne la main. La description et la
         balise canonique restent gérées par route dans le composant Seo. -->
    <title>ScanGo, read manga online</title>

    <!-- Carte de partage par défaut.

         Les robots des réseaux sociaux (Discord, X, Facebook, iMessage,
         WhatsApp, Slack...) n'exécutent pas le JavaScript : ils ne voient donc
         jamais les balises Open Graph injectées par React via react-helmet.
         Sans ces balises STATIQUES, un lien partagé ne montre aucun aperçu.

         Elles décrivent la carte par défaut du site ; le composant Seo affine
         ces valeurs par page pour les moteurs capables de rendre React (Google).
         L'URL doit pointer vers le domaine réellement déployé. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ScanGo" />
    <meta property="og:title" content="ScanGo, read manga online" />
    <meta
      property="og:description"
      content="Full catalogue, latest releases, genre search, and an immersive reader."
    />
    <meta property="og:url" content="https://scango.malekbouzarkouna.com/" />
    <meta property="og:image" content="https://scango.malekbouzarkouna.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ScanGo — read manga online" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ScanGo, read manga online" />
    <meta
      name="twitter:description"
      content="Full catalogue, latest releases, genre search, and an immersive reader."
    />
    <meta name="twitter:image" content="https://scango.malekbouzarkouna.com/og-image.png" />

    <!-- Préconnexions vers les hôtes d'images, qui servent chaque couverture. -->
    <link rel="preconnect" href="https://uploads.mangadex.org" />
    <link rel="dns-prefetch" href="https://uploads.mangadex.org" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ScanGo",
        "url": "https://scango.malekbouzarkouna.com/",
        "inLanguage": "en-US",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://scango.malekbouzarkouna.com/search/{search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
