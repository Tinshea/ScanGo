services:
  backend:
    build: ./Gotestweb
    ports:
      - "8080:8080"
    dns:
      - 8.8.8.8
    environment:
      - MONGO_URI=${MONGO_URI}
      - AIMLAPI_KEY=${AIMLAPI_KEY}
      - CLOUDINARY_URL=${CLOUDINARY_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo

  frontend:
    build: ./Client
    ports:
      - "3000:80"
    depends_on:
      - backend

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
